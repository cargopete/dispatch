services:
  # ── Indexer service (one per node) ────────────────────────────────────────
  dispatch-service:
    build:
      context: .
      target: service
    ports:
      - "7700:7700"
    volumes:
      - ./docker/config.toml:/etc/dispatch/config.toml:ro
    environment:
      DISPATCH_CONFIG: /etc/dispatch/config.toml
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Gateway (routes requests to indexers) ─────────────────────────────────
  dispatch-gateway:
    build:
      context: .
      target: gateway
    ports:
      - "8080:8080"
    volumes:
      - ./docker/gateway.toml:/etc/dispatch/gateway.toml:ro
    environment:
      DISPATCH_GATEWAY_CONFIG: /etc/dispatch/gateway.toml
      RUST_LOG: info
    restart: unless-stopped

  # ── PostgreSQL (optional — dispatch-service persists TAP receipts here) ───────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: dispatch
      POSTGRES_DB: dispatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
