version: "3.9"

# ── Dispatch full-stack ────────────────────────────────────────────────────────────
#
# Services:
#   dispatch-gateway  — QoS-aware gateway, TAP receipt signing, /metrics, /ws
#   dispatch-service  — Indexer service, JSON-RPC proxy, TAP receipt validation
#   dispatch-oracle   — Block header oracle; submits L1 state roots to Arbitrum for Tier 1 fraud proofs
#   postgres      — PostgreSQL for TAP receipt and RAV persistence
#
# Quick start:
#   cp docker/gateway.example.toml docker/gateway.toml
#   cp docker/config.example.toml  docker/config.toml
#   cp docker/oracle.example.toml  docker/oracle.toml
#   # Fill in private keys, provider addresses, and backend URLs.
#   docker compose -f docker/docker-compose.yml up

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: dispatch
      POSTGRES_DB: dispatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  dispatch-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7700:7700"
    volumes:
      - ./config.toml:/etc/dispatch/config.toml:ro
    environment:
      DISPATCH_CONFIG: /etc/dispatch/config.toml
      RUST_LOG: info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  dispatch-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    depends_on:
      dispatch-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./gateway.toml:/etc/dispatch/gateway.toml:ro
    environment:
      DISPATCH_GATEWAY_CONFIG: /etc/dispatch/gateway.toml
      RUST_LOG: info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  dispatch-oracle:
    build:
      context: ..
      dockerfile: docker/Dockerfile.oracle
    restart: unless-stopped
    volumes:
      - ./oracle.toml:/etc/dispatch/oracle.toml:ro
    environment:
      DISPATCH_ORACLE_CONFIG: /etc/dispatch/oracle.toml
      RUST_LOG: info

volumes:
  postgres_data:
