specVersion: 0.0.5
description: RPC network provider registry — indexes RPCDataService events for
  dynamic provider discovery
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: RPCDataService
    network: arbitrum-one
    source:
      abi: RPCDataService
      address: "0x73846272813065c3e4efdb3fb82e0d128c8c2364"
      startBlock: 452702455
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Indexer
        - ChainRegistration
        - SupportedChain
        - Protocol
        - ChainProposal
        - RewardBalance
      abis:
        - name: RPCDataService
          file: ./abis/RPCDataService.json
      eventHandlers:
        - event: ChainAdded(indexed uint256,uint256)
          handler: handleChainAdded
        - event: ChainRemoved(indexed uint256)
          handler: handleChainRemoved
        - event: ChainProposed(indexed uint256,indexed address,uint256)
          handler: handleChainProposed
        - event: ChainBondReleased(indexed uint256,indexed address,uint256)
          handler: handleChainBondReleased
        - event: ChainBondForfeited(indexed uint256,uint256)
          handler: handleChainBondForfeited
        - event: ProviderRegistered(indexed address,string,string)
          handler: handleProviderRegistered
        - event: ProviderDeregistered(indexed address)
          handler: handleProviderDeregistered
        - event: PaymentsDestinationSet(indexed address,indexed address)
          handler: handlePaymentsDestinationSet
        - event: ServiceStarted(indexed address,indexed uint64,uint8,string)
          handler: handleServiceStarted
        - event: ServiceStopped(indexed address,indexed uint64,uint8)
          handler: handleServiceStopped
        - event: FraudProofSubmitted(indexed address,indexed address,uint256)
          handler: handleFraudProofSubmitted
        - event: MinThawingPeriodSet(uint64)
          handler: handleMinThawingPeriodSet
        - event: RewardsAccrued(indexed address,uint256)
          handler: handleRewardsAccrued
        - event: RewardsClaimed(indexed address,uint256)
          handler: handleRewardsClaimed
        - event: RewardsDeposited(uint256)
          handler: handleRewardsDeposited
        - event: RewardsWithdrawn(uint256)
          handler: handleRewardsWithdrawn
      file: ./src/mapping.ts
